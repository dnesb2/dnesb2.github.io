<!DOCTYPE html>
<html>
<head>
    <title>Button Example</title>
</head>
<body>

    <!-- A button that triggers a JavaScript alert when clicked -->
    <button onclick="alert('Hi')">hi</button>
    <div className="card" style={{ background: '#4a475a', padding: '20px', borderRadius: '8px', margin: '10px', minWidth: '200px' }}>
      <p>Food: {item.food_name}</p>
      <p>Desc: {item.food_desc}</p>
      <p>Status: {item.status}</p>
      <p style={{ fontSize: '10px'}}>{item.id}</p>
    </div>

</body>

</html>
